<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="减脂追踪">
<meta name="theme-color" content="#4CAF50">
<title>减脂追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#333;padding-bottom:70px;padding-top:env(safe-area-inset-top)}
.header{background:#4CAF50;color:white;padding:16px;text-align:center;font-size:18px;font-weight:bold}
.tab-bar{display:flex;background:white;border-bottom:1px solid #ddd}
.tab-btn{flex:1;padding:14px;text-align:center;font-size:15px;color:#666;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tab-btn.active{color:#4CAF50;border-bottom-color:#4CAF50;font-weight:bold}
.tab-content{display:none;padding:16px}
.tab-content.active{display:block}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card-title{font-size:14px;color:#999;margin-bottom:8px}
input[type=number]{width:100%;padding:12px;font-size:20px;text-align:center;border:2px solid #e0e0e0;border-radius:8px;margin:8px 0}
input[type=number]:focus{outline:none;border-color:#4CAF50}
.btn{width:100%;padding:14px;font-size:17px;font-weight:bold;border:none;border-radius:10px;cursor:pointer;margin:8px 0}
.btn-primary{background:#4CAF50;color:white}
.btn-primary:active{background:#388E3C}
.habit-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.habit-item label{flex:1;font-size:16px}
.habit-item input[type=checkbox]{width:22px;height:22px;accent-color:#4CAF50}
canvas{width:100%;height:280px;display:block}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;font-size:15px}
.stat-value{font-weight:bold}
.progress-bar{height:10px;background:#e0e0e0;border-radius:5px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;background:#4CAF50;border-radius:5px;transition:width .3s}
.good{color:#4CAF50}.warn{color:#FF9800}.bad{color:#F44336}
.history-table{width:100%;font-size:13px;border-collapse:collapse}
.history-table th,.history-table td{padding:8px 4px;text-align:center;border-bottom:1px solid #f0f0f0}
.history-table th{color:#999;font-weight:normal;font-size:12px}
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:#4CAF50;color:white;font-size:24px;border:none;box-shadow:0 3px 8px rgba(0,0,0,.2);cursor:pointer;z-index:100;display:none}
</style>
</head>
<body>

<div class="header">减脂追踪</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('checkin')">打卡</button>
  <button class="tab-btn" onclick="switchTab('trend')">趋势</button>
  <button class="tab-btn" onclick="switchTab('history')">历史</button>
</div>

<!-- 打卡 -->
<div id="tab-checkin" class="tab-content active">
  <div class="card">
    <div class="card-title">今日体重 (kg)</div>
    <input type="number" id="weight" step="0.1" min="30" max="200" placeholder="请输入体重">
  </div>
  <div class="card" id="habits-card"></div>
  <button class="btn btn-primary" onclick="doCheckin()">打卡完成</button>
  <div id="checkin-msg" style="text-align:center;margin-top:8px;font-size:14px"></div>
</div>

<!-- 趋势 -->
<div id="tab-trend" class="tab-content">
  <div class="card">
    <canvas id="chart"></canvas>
  </div>
  <div class="card">
    <div class="stat-row"><span>目标</span><span id="t-goal" class="stat-value"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="t-progress-fill"></div></div>
    <div class="stat-row"><span>进度</span><span id="t-progress" class="stat-value"></span></div>
    <div class="stat-row"><span>当前体重</span><span id="t-current" class="stat-value"></span></div>
    <div class="stat-row"><span>7日均线</span><span id="t-ma" class="stat-value"></span></div>
    <div class="stat-row"><span>趋势</span><span id="t-trend" class="stat-value"></span></div>
    <div class="stat-row"><span>预计到达</span><span id="t-eta" class="stat-value"></span></div>
  </div>
</div>

<!-- 历史 -->
<div id="tab-history" class="tab-content">
  <div class="card" style="overflow-x:auto">
    <table class="history-table" id="history-table">
      <thead><tr><th>日期</th><th>体重</th><th>变化</th><th>达标</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
// ── 常量 ──
const START_W = 52.5;
const TARGET_W = 49.5;
const HABITS = ['运动量达标','喝够水','不吃太饱','不下雨就去散步'];

// ── 数据读写 ──
function loadData(){try{return JSON.parse(localStorage.getItem('ft_data')||'{"records":[]}')}catch(e){return{records:[]}}}
function saveData(d){localStorage.setItem('ft_data',JSON.stringify(d))}

// ── 初始化 ──
function init(){
  var hc=document.getElementById('habits-card');
  hc.innerHTML='';
  HABITS.forEach(function(h){
    hc.innerHTML+='<div class="habit-item"><label>'+h+'</label><input type="checkbox" id="h_'+h+'"></div>';
  });
  var today=new Date().toISOString().slice(0,10);
  var data=loadData();
  var found=data.records.filter(function(r){return r.date===today});
  if(found.length>0){
    document.getElementById('weight').value=found[0].weight;
    HABITS.forEach(function(h){
      if(found[0].habits_done.indexOf(h)>=0)document.getElementById('h_'+h).checked=true;
    });
    document.getElementById('checkin-msg').innerHTML='<span style="color:#4CAF50">今日已打卡</span>';
  }
  renderTrend();
  renderHistory();
}

// ── 打卡 ──
function doCheckin(){
  var w=parseFloat(document.getElementById('weight').value);
  if(!w||w<30||w>200){document.getElementById('checkin-msg').innerHTML='<span style="color:#F44336">请输入合理体重</span>';return}
  var done=[];
  HABITS.forEach(function(h){if(document.getElementById('h_'+h).checked)done.push(h)});
  var today=new Date().toISOString().slice(0,10);
  var data=loadData();
  data.records=data.records.filter(function(r){return r.date!==today});
  data.records.push({date:today,weight:w,habits_done:done,timestamp:new Date().toISOString()});
  data.records.sort(function(a,b){return a.date.localeCompare(b.date)});
  saveData(data);
  var total=HABITS.length;
  var ok=done.length;
  var star=ok===total?'★':(ok>=total/2?'☆':'○');
  document.getElementById('checkin-msg').innerHTML='<span style="color:#4CAF50">'+star+' 打卡完成 '+ok+'/'+total+' 个习惯达标</span>';
  renderTrend();
  renderHistory();
}

// ── 趋势 ──
function renderTrend(){
  var data=loadData();
  var recs=data.records;
  var canvas=document.getElementById('chart');
  var ctx=canvas.getContext('2d');
  var W=canvas.width=canvas.offsetWidth*2;
  var H=canvas.height=280*2;
  ctx.scale(2,2);
  W/=2;H/=2;

  if(recs.length<2){ctx.fillStyle='#999';ctx.font='14px sans-serif';ctx.fillText('数据不足，至少需要 2 天记录',10,100);return}

  var recent=recs.slice(-30);
  var dates=recent.map(function(r){return r.date});
  var weights=recent.map(function(r){return r.weight});
  var ma=[];
  for(var i=0;i<weights.length;i++){
    var s=0,n=0;
    for(var j=Math.max(0,i-6);j<=i;j++){s+=weights[j];n++}
    ma.push(s/n);
  }

  var pad={top:20,right:16,bottom:40,left:48};
  var pw=W-pad.left-pad.right;
  var ph=H-pad.top-pad.bottom;
  var wMin=Math.min.apply(null,weights.concat(ma))-0.3;
  var wMax=Math.max.apply(null,weights.concat(ma))+0.3;
  var rng=Math.max(wMax-wMin,0.5);
  function x(i){return pad.left+(i/(weights.length-1))*pw}
  function y(v){return pad.top+ph-((v-wMin)/rng)*ph}

  // 背景网格
  ctx.strokeStyle='#eee';ctx.lineWidth=0.5;
  for(var g=0;g<=4;g++){var gy=pad.top+(ph/4)*g;ctx.beginPath();ctx.moveTo(pad.left,gy);ctx.lineTo(W-pad.right,gy);ctx.stroke()}

  // 均线
  ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.beginPath();
  for(var i=0;i<ma.length;i++){var px=x(i),py=y(ma[i]);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}
  ctx.stroke();ctx.setLineDash([]);

  // 实际线
  ctx.strokeStyle='#2196F3';ctx.lineWidth=2;ctx.beginPath();
  for(var i=0;i<weights.length;i++){var px=x(i),py=y(weights[i]);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}
  ctx.stroke();

  // 数据点
  for(var i=0;i<weights.length;i++){ctx.fillStyle='#2196F3';ctx.beginPath();ctx.arc(x(i),y(weights[i]),3,0,Math.PI*2);ctx.fill()}

  // Y轴标签
  ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='right';
  for(var g=0;g<=4;g++){var v=wMin+rng*(4-g)/4;var gy=pad.top+(ph/4)*g;ctx.fillText(v.toFixed(1),pad.left-6,gy+3)}

  // X轴标签
  ctx.textAlign='center';
  var step=Math.max(1,Math.floor(dates.length/5));
  for(var i=0;i<dates.length;i+=step){ctx.fillText(dates[i].slice(5),x(i),H-pad.bottom+16)}

  // 图例
  ctx.fillStyle='#2196F3';ctx.fillText('-- 实际',W-80,pad.top-4);
  ctx.fillStyle='#4CAF50';ctx.fillText('.. 均线',W-40,pad.top-4);

  // 统计
  var latest=weights[weights.length-1];
  var latestMA=ma[ma.length-1];
  var progress=((START_W-latest)/(START_W-TARGET_W))*100;
  progress=Math.max(0,Math.min(100,progress));

  var trendTxt='数据积累中...',trendCls='warn';
  if(ma.length>=7){var rma=(ma[ma.length-1]+ma[ma.length-2]+ma[ma.length-3])/3;var ema=(ma[ma.length-7]+ma[ma.length-6]+ma[ma.length-5])/3;var d=rma-ema;
    if(d<-0.1){trendTxt='↓ 下降中';trendCls='good'}else if(d>0.1){trendTxt='↑ 上升中';trendCls='bad'}else{trendTxt='→ 持平';trendCls='warn'}
  }

  var eta='-';
  if(weights.length>=7){var dl=(weights[weights.length-7]-latest)/7;if(dl>0.005){var days=Math.round((latest-TARGET_W)/dl);var ed=new Date();ed.setDate(ed.getDate()+days);eta=ed.toISOString().slice(0,10)}else{eta='需加大热量缺口'}}

  document.getElementById('t-goal').textContent=START_W+'kg → '+TARGET_W+'kg (-'+(START_W-TARGET_W).toFixed(1)+'kg)';
  document.getElementById('t-progress').innerHTML='<span class="'+trendCls+'">'+progress.toFixed(0)+'%</span>';
  document.getElementById('t-progress-fill').style.width=progress+'%';
  document.getElementById('t-current').textContent=latest+'kg';
  document.getElementById('t-ma').textContent=latestMA.toFixed(1)+'kg';
  document.getElementById('t-trend').innerHTML='<span class="'+trendCls+'">'+trendTxt+'</span>';
  document.getElementById('t-eta').textContent=eta;
}

// ── 历史 ──
function renderHistory(){
  var data=loadData();
  var recs=data.records.slice().reverse().slice(0,30);
  var tbody=document.querySelector('#history-table tbody');
  tbody.innerHTML='';
  recs.forEach(function(r,i){
    var prev=recs[i+1];
    var chg=prev?'<span class="'+(r.weight<prev.weight?'good':'bad')+'">'+(r.weight-prev.weight).toFixed(1)+'</span>':'';
    var ok=r.habits_done.length;
    var tr='<tr><td>'+r.date.slice(5)+'</td><td><b>'+r.weight+'</b></td><td>'+chg+'</td><td>'+ok+'/'+HABITS.length+'</td></tr>';
    tbody.innerHTML+=tr;
  });
}

// ── Tab 切换 ──
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='trend'){setTimeout(renderTrend,100)}
  if(name==='history')renderHistory();
}

init();
</script>
</body>
</html>
